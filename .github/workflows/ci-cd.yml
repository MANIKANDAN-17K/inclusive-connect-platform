# ─────────────────────────────────────────────────────────────────────
#  InclusiveConnect — GitHub Actions CI/CD Pipeline
#
#  Jobs:
#   backend-ci   — Build + test the Spring Boot API
#   frontend-ci  — Install, lint, build the Angular app
#   docker-build — Build & push Docker images (main branch only)
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#   DOCKER_HUB_USERNAME   — Docker Hub username (or registry login)
#   DOCKER_HUB_TOKEN      — Docker Hub access token
#
#  Optional — add deployment secrets for SSH / cloud deploy steps.
# ─────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  DOCKER_REGISTRY: docker.io
  BACKEND_IMAGE:  ${{ secrets.DOCKER_HUB_USERNAME }}/inclusive-connect-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/inclusive-connect-frontend

# ── Backend CI ────────────────────────────────────────────────────────
jobs:
  backend-ci:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_ci
          MYSQL_DATABASE:      inclusive_connect_test
          MYSQL_USER:          ic_test
          MYSQL_PASSWORD:      ic_test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build with Maven (skip tests initially for fast feedback)
        working-directory: ./InclusiveConnectBackend
        run: ./mvnw package -DskipTests -B

      - name: Run Tests
        working-directory: ./InclusiveConnectBackend
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_HOST:     localhost
          DB_PORT:     3306
          DB_NAME:     inclusive_connect_test
          DB_USERNAME: ic_test
          DB_PASSWORD: ic_test_pass
          DB_USE_SSL:  "false"
          JWT_SECRET:  ci_test_jwt_secret_do_not_use_in_production_at_all
          MAIL_USERNAME: ci@example.com
          MAIL_PASSWORD: ci_password
          CLOUDINARY_URL: cloudinary://test:test@test
          CORS_ALLOWED_ORIGINS: http://localhost:4200
        run: ./mvnw test -B

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: InclusiveConnectBackend/target/surefire-reports/
          retention-days: 7

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: InclusiveConnectBackend/target/*.jar
          retention-days: 1

  # ── Frontend CI ──────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: InclusiveConnectFrontend/package-lock.json

      - name: Install dependencies
        working-directory: ./InclusiveConnectFrontend
        run: npm ci

      - name: Build production bundle
        working-directory: ./InclusiveConnectFrontend
        run: npm run build -- --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: InclusiveConnectFrontend/dist/
          retention-days: 1

  # ── Docker Build & Push (main branch only) ───────────────────────────
  docker-build:
    name: Docker — Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata for backend image
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Extract metadata for frontend image
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./InclusiveConnectBackend
          file: ./InclusiveConnectBackend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./InclusiveConnectFrontend
          file: ./InclusiveConnectFrontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Docker Images Published 🐳" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | ${{ steps.backend-meta.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ steps.frontend-meta.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
