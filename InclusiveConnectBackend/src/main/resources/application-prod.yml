# ─────────────────────────────────────────────────────────
#  InclusiveConnect Backend — Production Profile
#  All secrets are injected through environment variables.
#  Never commit real values to source control.
# ─────────────────────────────────────────────────────────

spring:

  # ── Database ────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:inclusive_connect}?createDatabaseIfNotExist=false&useSSL=${DB_USE_SSL:true}&allowPublicKeyRetrieval=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      pool-name: InclusiveConnectHikariCP

  # ── JPA / Hibernate ─────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate        # NEVER use update/create in production
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 20
    open-in-view: false

  # ── Mail ────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connection-timeout: 10000
        timeout: 10000
        write-timeout: 10000

# ── Server ──────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024
  servlet:
    context-path: /

# ── Application Secrets / Settings ──────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRY_MS:900000}       # 15 min
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}  # 7 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://inclusiveconnect.com}

# ── Cloudinary ──────────────────────────────────────────
# Provided via CLOUDINARY_URL env var (sdk auto-detects it)

# ── Springdoc / Swagger — disable in production ─────────
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ── Logging ─────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.inclusiveconnect: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ── Actuator ────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
