# ─────────────────────────────────────────────────────────────────────
#  Nginx Configuration — InclusiveConnect Frontend
#
#  Responsibilities:
#   1. Serve the Angular SPA (with HTML5 pushState routing)
#   2. Reverse proxy /api  → backend Spring Boot container
#   3. Reverse proxy /ws   → backend WebSocket
#   4. Gzip compression for text assets
#   5. Production security headers
#   6. Cache-control for static assets
# ─────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # ── Gzip Compression ───────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Upstream: Spring Boot Backend ─────────────────────
    upstream backend {
        server backend:8080;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── Security Headers ────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options    "nosniff"                           always;
        add_header X-XSS-Protection          "1; mode=block"                     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # ── API Proxy ─────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Do not cache API responses
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # ── WebSocket Proxy ───────────────────────────────
        location /ws {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Static Assets — long-lived cache ─────────────
        location ~* \.(js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── index.html — no cache (SPA entry point) ──────
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }

        # ── Angular SPA — HTML5 pushState routing ─────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Health check endpoint ─────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
