<section class="max-w-4xl mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Admin dashboard</h1>

  <div *ngIf="loading" class="text-gray-500">Loading…</div>

  <div *ngIf="stats" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
    <div class="border rounded-lg p-4">
      <p class="text-2xl font-bold text-gray-900">{{ stats.totalUsers }}</p>
      <p class="text-sm text-gray-500">Total users</p>
    </div>
    <div class="border rounded-lg p-4">
      <p class="text-2xl font-bold text-gray-900">{{ stats.totalCandidates }}</p>
      <p class="text-sm text-gray-500">Candidates</p>
    </div>
    <div class="border rounded-lg p-4">
      <p class="text-2xl font-bold text-gray-900">{{ stats.totalEmployers }}</p>
      <p class="text-sm text-gray-500">Employers</p>
    </div>
    <div class="border rounded-lg p-4">
      <p class="text-2xl font-bold text-gray-900">{{ stats.totalJobs }}</p>
      <p class="text-sm text-gray-500">Total jobs</p>
    </div>
    <div class="border rounded-lg p-4" [class.border-error]="stats.pendingEmployerVerifications > 0">
      <p class="text-2xl font-bold" [class.text-error]="stats.pendingEmployerVerifications > 0">
        {{ stats.pendingEmployerVerifications }}
      </p>
      <p class="text-sm text-gray-500">Pending verifications</p>
    </div>
  </div>

  <div class="flex gap-4">
    <a routerLink="/admin/users" class="rounded bg-primary text-white px-4 py-2 text-sm">Manage users</a>
    <a routerLink="/admin/employers" class="rounded border px-4 py-2 text-sm">Verify employers</a>
  </div>
</section>
