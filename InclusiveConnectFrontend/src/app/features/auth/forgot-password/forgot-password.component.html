<section class="min-h-screen flex items-center justify-center bg-white px-4">
  <form
    class="w-full max-w-sm space-y-4"
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    aria-labelledby="forgot-heading"
  >
    <h1 id="forgot-heading" class="text-2xl font-semibold text-gray-900">Reset your password</h1>
    <p class="text-sm text-gray-600">Enter your email and we'll send you a reset link.</p>

    <div>
      <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
      <input id="email" type="email" formControlName="email" class="mt-1 w-full rounded border border-gray-300 px-3 py-2" />
    </div>

    <p class="text-sm text-gray-700" role="status" *ngIf="message">{{ message }}</p>

    <button
      type="submit"
      class="w-full rounded bg-primary text-white py-2 font-medium disabled:opacity-50"
      [disabled]="submitting"
    >
      {{ submitting ? 'Sending…' : 'Send reset link' }}
    </button>

    <a routerLink="/auth/login" class="block text-sm text-primary underline">Back to sign in</a>
  </form>
</section>
