<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center bg-background px-4 py-10">
  <div class="w-full max-w-md animate-fade-in">
    <div class="card p-8 shadow-card">
      <div class="text-center mb-6">
        <img src="assets/logo.png" alt="" class="mx-auto h-12 w-12 rounded-xl object-contain ring-1 ring-border mb-3" width="48" height="48" />
        <h1 id="forgot-heading" class="text-2xl font-heading font-semibold">Reset your password</h1>
        <p class="text-sm text-text-secondary mt-2">Enter your email and we'll send you a reset link.</p>
      </div>

      <form class="space-y-4" [formGroup]="form" (ngSubmit)="onSubmit()" aria-labelledby="forgot-heading" novalidate>
        <div>
          <label for="email" class="label-field">Email</label>
          <input id="email" type="email" formControlName="email" autocomplete="email" class="input-field" />
        </div>

        <p class="text-sm text-text-primary bg-primary-50 border border-primary-100 rounded-xl p-3" role="status" *ngIf="message">
          {{ message }}
        </p>

        <button type="submit" class="btn-primary w-full py-3" [disabled]="submitting">
          {{ submitting ? 'Sending…' : 'Send reset link' }}
        </button>

        <a routerLink="/auth/login" class="block text-center text-sm text-primary font-medium hover:underline">
          Back to sign in
        </a>
      </form>
    </div>
  </div>
</div>
