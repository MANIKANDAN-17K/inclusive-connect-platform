<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center bg-background px-4 py-10">
  <div class="w-full max-w-md animate-fade-in">
    <div class="card p-8 shadow-card">
      <div class="text-center mb-8">
        <img
          src="assets/logo.png"
          alt="InclusiveConnect"
          class="mx-auto h-14 w-14 rounded-xl object-contain ring-1 ring-border mb-3"
          width="56"
          height="56"
        />
        <h1 class="text-2xl font-heading font-semibold text-text-primary">Welcome back</h1>
        <p class="text-sm text-text-secondary mt-1">Sign in to InclusiveConnect</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5" novalidate>
        <div>
          <label for="email" class="label-field">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="you@example.com"
            class="input-field"
            [attr.aria-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
          />
          <p
            *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
            class="text-error text-xs mt-1"
            role="alert"
          >
            Please enter a valid email
          </p>
        </div>

        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label for="password" class="label-field !mb-0">Password</label>
            <a routerLink="/auth/forgot-password" class="text-sm text-primary font-medium hover:underline">
              Forgot password?
            </a>
          </div>
          <input
            id="password"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
            class="input-field"
            [attr.aria-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
          />
          <p
            *ngIf="form.get('password')?.invalid && form.get('password')?.touched"
            class="text-error text-xs mt-1"
            role="alert"
          >
            Password must be at least 8 characters
          </p>
        </div>

        <div *ngIf="errorMessage" class="text-error text-sm text-center bg-red-50 border border-red-100 p-3 rounded-xl" role="alert">
          {{ errorMessage }}
        </div>

        <button type="submit" class="btn-primary w-full py-3" [disabled]="submitting || form.invalid">
          {{ submitting ? 'Signing in…' : 'Sign in' }}
        </button>

        <p class="text-center text-sm text-text-secondary">
          Don't have an account?
          <a routerLink="/auth/register" class="text-primary font-semibold hover:underline">Sign up</a>
        </p>
      </form>
    </div>
  </div>
</div>
