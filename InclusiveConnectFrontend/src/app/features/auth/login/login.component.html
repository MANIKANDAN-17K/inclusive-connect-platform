<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-blue-50/70 p-4 font-sans">
  <div class="w-full max-w-md">
    <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl shadow-blue-200/50 border border-white/50 p-8 transition-all duration-300 hover:shadow-blue-300/30">
      
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-tr from-primary-500 to-indigo-500 text-white shadow-md shadow-primary-200 mb-3">
          <i class="fas fa-lock text-2xl"></i>
        </div>
        <h2 class="text-2xl font-semibold text-slate-800 tracking-tight">Welcome back</h2>
        <p class="text-sm text-slate-500 mt-1">Sign in to your account</p>
      </div>

      <!-- ✅ FIXED: Added [formGroup]="form" -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <!-- Email field -->
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">
            <i class="far fa-envelope mr-1.5 text-slate-400"></i> Email
          </label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="marcia@example.com"
            class="w-full rounded-xl border border-slate-200 bg-white/70 px-4 py-3 text-sm text-slate-800 placeholder:text-slate-400 focus:border-primary-400 focus:ring-2 focus:ring-primary-200/60 focus:outline-none transition-all duration-200"
          />
          <!-- Optional: Show validation errors -->
          <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" 
               class="text-red-500 text-xs mt-1">
            Please enter a valid email
          </div>
        </div>

        <!-- Password field -->
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label for="password" class="block text-sm font-medium text-slate-700">
              <i class="fas fa-key mr-1.5 text-slate-400"></i> Password
            </label>
          </div>
          
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="mt-1 w-full rounded-xl border border-slate-200 bg-white/70 px-4 py-3 text-sm text-slate-800 placeholder:text-slate-400 focus:border-primary-400 focus:ring-2 focus:ring-primary-200/60 focus:outline-none transition-all duration-200"
          />
          
          <!-- Optional: Show validation errors -->
          <div *ngIf="form.get('password')?.invalid && form.get('password')?.touched" 
               class="text-red-500 text-xs mt-1">
            Password must be at least 8 characters
          </div>
          
          <div class="mt-3 text-right">
            <a routerLink="/auth/forgot-password" class="text-sm text-primary underline font-medium inline-flex items-center gap-1.5 text-indigo-600 hover:text-indigo-800 transition-colors duration-200">
              <i class="fas fa-arrow-right text-xs opacity-70"></i> Forgot password?
            </a>
          </div>
        </div>

        <!-- Error message display -->
        <div *ngIf="errorMessage" class="text-red-500 text-sm text-center bg-red-50 p-2 rounded-xl">
          {{ errorMessage }}
        </div>

       <button
  type="submit"
  [disabled]="submitting || form.invalid"
  class="mt-2 w-full rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 py-3.5 text-sm font-semibold text-white shadow-lg shadow-blue-600/40 hover:shadow-blue-600/60 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed border-2 border-white/30 hover:border-white/50"
>
  <i class="fas fa-arrow-right-to-bracket"></i> 
  {{ submitting ? 'Signing in...' : 'Sign in' }}
</button>

        <p class="text-center text-sm text-slate-500 mt-4">
          Don't have an account? 
          <a routerLink="/auth/register" class="text-primary font-medium text-indigo-600 hover:text-indigo-800 underline-offset-2 hover:underline transition">Sign up</a>
        </p>
      </form>

      <div class="mt-6 text-center text-[11px] text-slate-400/80 border-t border-slate-200/60 pt-4">
        <i class="fas fa-angular text-xs mr-1"></i> Angular ready · formControlName="password"
      </div>
    </div>
  </div>
</div>
