<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center bg-background px-4 py-10">
  <div class="w-full max-w-lg animate-fade-in">
    <div class="card p-8 shadow-card">
      <div class="text-center mb-8">
        <img
          src="assets/logo.png"
          alt="InclusiveConnect"
          class="mx-auto h-14 w-14 rounded-xl object-contain ring-1 ring-border mb-3"
          width="56"
          height="56"
        />
        <h1 id="register-heading" class="text-2xl font-heading font-semibold text-text-primary">Create your account</h1>
        <p class="text-sm text-text-secondary mt-1">Join InclusiveConnect — Connect Beyond Limits</p>
      </div>

      <form class="space-y-4" [formGroup]="form" (ngSubmit)="onSubmit()" aria-labelledby="register-heading" novalidate>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label for="firstName" class="label-field">First name</label>
            <input id="firstName" formControlName="firstName" autocomplete="given-name" class="input-field" />
          </div>
          <div>
            <label for="lastName" class="label-field">Last name</label>
            <input id="lastName" formControlName="lastName" autocomplete="family-name" class="input-field" />
          </div>
        </div>

        <div>
          <label for="email" class="label-field">Email</label>
          <input id="email" type="email" formControlName="email" autocomplete="email" class="input-field" />
        </div>

        <div>
          <label for="password" class="label-field">Password</label>
          <input id="password" type="password" formControlName="password" autocomplete="new-password" class="input-field" />
          <p class="text-xs text-text-secondary mt-1">At least 8 characters</p>
        </div>

        <div>
          <label for="confirmPassword" class="label-field">Confirm password</label>
          <input id="confirmPassword" type="password" formControlName="confirmPassword" autocomplete="new-password" class="input-field" />
        </div>

        <fieldset class="rounded-xl border border-border p-4">
          <legend class="px-1 text-sm font-medium text-text-primary">I am registering as</legend>
          <div class="flex flex-wrap gap-4 mt-1">
            <label class="inline-flex items-center gap-2 cursor-pointer text-sm">
              <input type="radio" formControlName="role" value="CANDIDATE" class="text-primary focus:ring-primary" />
              Candidate / Professional
            </label>
            <label class="inline-flex items-center gap-2 cursor-pointer text-sm">
              <input type="radio" formControlName="role" value="EMPLOYER" class="text-primary focus:ring-primary" />
              Employer / Recruiter
            </label>
          </div>
        </fieldset>

        <p class="text-accent text-sm" role="status" *ngIf="successMessage">{{ successMessage }}</p>
        <p class="text-error text-sm" role="alert" *ngIf="errorMessage">{{ errorMessage }}</p>

        <button type="submit" class="btn-primary w-full py-3" [disabled]="submitting">
          {{ submitting ? 'Creating account…' : 'Create account' }}
        </button>

        <p class="text-center text-sm text-text-secondary">
          Already have an account?
          <a routerLink="/auth/login" class="text-primary font-semibold hover:underline">Sign in</a>
        </p>
      </form>
    </div>
  </div>
</div>
