<section class="min-h-screen flex items-center justify-center bg-white px-4">
  <div class="w-full max-w-sm space-y-4" *ngIf="tokenMissing; else resetForm">
    <p class="text-error">This reset link is invalid. Please request a new one.</p>
    <a routerLink="/auth/forgot-password" class="text-primary underline">Request a new link</a>
  </div>

  <ng-template #resetForm>
    <form class="w-full max-w-sm space-y-4" [formGroup]="form" (ngSubmit)="onSubmit()" aria-labelledby="reset-heading">
      <h1 id="reset-heading" class="text-2xl font-semibold text-gray-900">Choose a new password</h1>

      <div>
        <label for="newPassword" class="block text-sm font-medium text-gray-700">New password</label>
        <input id="newPassword" type="password" formControlName="newPassword" class="mt-1 w-full rounded border border-gray-300 px-3 py-2" />
      </div>

      <p class="text-success text-sm" role="status" *ngIf="successMessage">{{ successMessage }}</p>
      <p class="text-error text-sm" role="alert" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" class="w-full rounded bg-primary text-white py-2 font-medium disabled:opacity-50" [disabled]="submitting">
        {{ submitting ? 'Resetting…' : 'Reset password' }}
      </button>
    </form>
  </ng-template>
</section>
