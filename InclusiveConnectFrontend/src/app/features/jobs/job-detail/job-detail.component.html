<section class="max-w-2xl mx-auto px-4 py-8">
  <a routerLink="/jobs" class="text-sm text-primary underline">&larr; Back to jobs</a>

  <div *ngIf="loading" class="text-center py-12 text-gray-500">Loading…</div>
  <p class="text-error mt-4" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div *ngIf="job as j" class="mt-4">
    <h1 class="text-2xl font-bold text-gray-900">{{ j.title }}</h1>
    <p class="text-gray-600 mt-1">{{ j.companyName }} · {{ j.location || 'Location not specified' }}</p>

    <div class="flex gap-2 mt-3">
      <span class="text-xs px-2 py-1 rounded-full bg-gray-100">{{ j.employmentType }}</span>
      <span class="text-xs px-2 py-1 rounded-full bg-gray-100" *ngIf="j.salaryRange">{{ j.salaryRange }}</span>
    </div>

    <p class="mt-6 whitespace-pre-line text-gray-700">{{ j.description }}</p>

    <div class="mt-6 p-4 bg-secondary/10 rounded-lg" *ngIf="j.accessibilityNotes">
      <h2 class="font-semibold text-sm mb-1">Accessibility</h2>
      <p class="text-sm text-gray-700">{{ j.accessibilityNotes }}</p>
    </div>

    <button class="mt-6 rounded bg-primary text-white px-6 py-3 font-medium">
      Apply now
    </button>
    <!-- TODO: wire this up once JobApplication (next stage) is built -->
  </div>
</section>
