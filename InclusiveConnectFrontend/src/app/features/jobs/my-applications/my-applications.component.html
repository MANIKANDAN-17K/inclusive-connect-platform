<section class="max-w-2xl mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">My applications</h1>

  <div *ngIf="loading" class="text-center py-12 text-gray-500">Loading…</div>
  <p class="text-error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <ul *ngIf="!loading" class="space-y-3">
    <li *ngFor="let app of applications" class="border rounded-lg p-4">
      <div class="flex justify-between items-start">
        <div>
          <a [routerLink]="['/jobs', app.jobId]" class="font-medium text-gray-900 hover:underline">{{ app.jobTitle }}</a>
          <p class="text-sm text-gray-600">{{ app.companyName }}</p>
          <p class="text-xs text-gray-400 mt-1">Applied {{ app.appliedAt | date: 'mediumDate' }}</p>
        </div>
        <span class="text-xs px-2 py-1 rounded-full font-medium" [ngClass]="statusColor(app.status)">
          {{ app.status }}
        </span>
      </div>
    </li>
    <li *ngIf="!applications.length" class="text-center py-12 text-gray-500">
      You haven't applied to any jobs yet.
    </li>
  </ul>
</section>
