<div class="max-w-2xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-xl font-bold text-gray-900">Notifications</h1>
        <button *ngIf="notifications.length" (click)="markAllRead()" id="mark-all-read-btn"
            class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">
            Mark all as read
        </button>
    </div>

    <div *ngIf="loading" class="space-y-3">
        <div *ngFor="let _ of [1,2,3]" class="h-16 bg-gray-100 rounded-lg animate-pulse"></div>
    </div>

    <div *ngIf="!loading && !notifications.length" class="text-center py-20 text-gray-400">
        <svg class="w-12 h-12 mx-auto text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        <p class="font-medium text-gray-500">You're all caught up!</p>
        <p class="text-sm mt-1">No notifications yet.</p>
    </div>

    <div class="space-y-2">
        <button *ngFor="let n of notifications" (click)="navigateTo(n)" [attr.id]="'notification-' + n.id"
            class="w-full text-left rounded-xl px-4 py-3.5 border flex items-start gap-3 transition-all hover:border-indigo-300"
            [class.bg-indigo-50]="!n.isRead" [class.border-indigo-200]="!n.isRead" [class.bg-white]="n.isRead"
            [class.border-gray-200]="n.isRead">
            <!-- Unread dot -->
            <span class="mt-1 w-2 h-2 rounded-full shrink-0" [class.bg-indigo-500]="!n.isRead"
                [class.bg-transparent]="n.isRead"></span>
            <div class="min-w-0 flex-1">
                <p class="text-sm font-semibold text-gray-900">{{ n.title }}</p>
                <p class="text-sm text-gray-600 mt-0.5">{{ n.message }}</p>
                <p class="text-xs text-gray-400 mt-1">{{ n.createdAt | date: 'medium' }}</p>
            </div>
        </button>
    </div>
</div>
