# ─────────────────────────────────────────────────────────────────────
#  InclusiveConnect — Docker Compose
#
#  Services:
#    mysql    — MySQL 8 database
#    backend  — Spring Boot REST API + WebSocket
#    frontend — Angular SPA served by Nginx (also proxies /api and /ws)
#
#  Usage:
#    cp .env.example .env   # fill in your secrets
#    docker compose up -d
#    docker compose logs -f
# ─────────────────────────────────────────────────────────────────────
version: "3.9"

services:

  # ── MySQL Database ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ic_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-inclusive_connect}
      MYSQL_USER:          ${MYSQL_USER:-ic_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    ports:
      # Expose locally for DBeaver / migration tools; remove in strict prod
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - ic_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Spring Boot Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./InclusiveConnectBackend
      dockerfile: Dockerfile
    image: inclusive-connect-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: ic_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Database
      DB_HOST:      mysql
      DB_PORT:      3306
      DB_NAME:      ${MYSQL_DATABASE:-inclusive_connect}
      DB_USERNAME:  ${MYSQL_USER:-ic_user}
      DB_PASSWORD:  ${MYSQL_PASSWORD}
      DB_USE_SSL:   "false"
      # JWT
      JWT_SECRET:              ${JWT_SECRET}
      JWT_ACCESS_EXPIRY_MS:    ${JWT_ACCESS_EXPIRY_MS:-900000}
      JWT_REFRESH_EXPIRY_MS:   ${JWT_REFRESH_EXPIRY_MS:-604800000}
      # Mail
      MAIL_HOST:     ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT:     ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      # Cloudinary
      CLOUDINARY_URL: ${CLOUDINARY_URL}
      # CORS — allow Nginx frontend
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      # Server
      SERVER_PORT: 8080
    # Backend is NOT exposed to host directly — Nginx proxies it
    expose:
      - "8080"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - ic_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Angular Frontend (Nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./InclusiveConnectFrontend
      dockerfile: Dockerfile
    image: inclusive-connect-frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: ic_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - ic_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# ── Networks ──────────────────────────────────────────────────────────
networks:
  ic_network:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  backend_uploads:
    driver: local
